name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify bin is executable in git index
        run: |
          mode=$(git ls-files --stage src/mcp_server.js | awk '{print $1}')
          test "$mode" = "100755" || { echo "src/mcp_server.js must be tracked as 100755 (current: $mode)"; exit 1; }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm run test:coverage

      - name: Security audit (production dependencies)
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        run: npm run build
